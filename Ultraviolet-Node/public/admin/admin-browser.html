<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sherbing Admin | Unrestricted Browser</title>
    <style>
      :root {
        --ink-900: #1f2a37;
        --ink-700: #334155;
        --ink-500: #64748b;
        --line: #d7e3f2;
        --card: #ffffff;
        --surface: #eef4fb;
        --action: #0a66c2;
        --action-hover: #084c93;
        --warn: #b93815;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink-900);
        background: radial-gradient(circle at 15% 8%, #d5ecff, #edf4fb 38%, #e6eef8 100%);
      }

      .dashboard {
        min-height: 100%;
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 12px;
        padding: 16px;
      }

      .header,
      .toolbar,
      .viewer {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
      }

      .header {
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .title {
        margin: 0;
        font-size: 1.1rem;
      }

      .meta {
        margin: 4px 0 0;
        color: var(--ink-500);
        font-size: 0.92rem;
      }

      .toolbar {
        padding: 12px;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        align-items: center;
      }

      #addressInput {
        width: 100%;
        border: 1px solid #bfd0e5;
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 0.98rem;
        color: var(--ink-900);
        background: var(--surface);
        outline: none;
      }

      #addressInput:focus {
        border-color: var(--action);
        box-shadow: 0 0 0 3px rgba(10, 102, 194, 0.2);
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        min-width: 92px;
        font-weight: 600;
        cursor: pointer;
        color: #ffffff;
        background: var(--action);
      }

      button:hover {
        background: var(--action-hover);
      }

      #status {
        margin-top: 10px;
        min-height: 1.3rem;
        color: var(--ink-700);
        font-size: 0.9rem;
      }

      #status.error {
        color: var(--warn);
      }

      .viewer {
        overflow: hidden;
        min-height: 0;
      }

      #uvFrame {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 62vh;
        border: 0;
        background: #ffffff;
      }

      @media (max-width: 900px) {
        .controls {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }

        #uvFrame {
          min-height: 68vh;
        }
      }
    </style>
    <script src="/baremux/index.js"></script>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
  </head>
  <body>
    <div class="dashboard">
      <section class="header">
        <div>
          <h1 class="title">Sherbing Admin Unrestricted Browser</h1>
          <p class="meta">Protected session routed through Ultraviolet (XOR codec).</p>
        </div>
      </section>

      <section class="toolbar">
        <form id="browserForm" class="controls">
          <input
            id="addressInput"
            name="address"
            type="text"
            autocomplete="off"
            placeholder="Enter URL or search term"
            value="https://www.google.com"
            required
          />
          <button type="button" id="homeBtn">Home</button>
          <button type="button" id="reloadBtn">Reload</button>
        </form>
        <div id="status" aria-live="polite"></div>
      </section>

      <section class="viewer">
        <iframe id="uvFrame" title="Unrestricted Browser Frame"></iframe>
      </section>
    </div>

    <script>
      "use strict";

      const HOME_URL = "https://www.google.com";
      const form = document.getElementById("browserForm");
      const addressInput = document.getElementById("addressInput");
      const homeBtn = document.getElementById("homeBtn");
      const reloadBtn = document.getElementById("reloadBtn");
      const frame = document.getElementById("uvFrame");
      const status = document.getElementById("status");
      const connection = new BareMux.BareMuxConnection("/baremux/worker.js");

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.classList.toggle("error", isError);
      }

      function normalizeAddress(input) {
        const value = input.trim();
        if (!value) {
          throw new Error("Enter a website URL or search term.");
        }

        const hasScheme = /^[a-zA-Z][a-zA-Z\d+\-.]*:\/\//.test(value);
        const candidate = hasScheme ? value : `https://${value}`;

        try {
          const parsed = new URL(candidate);
          if (parsed.hostname.includes(".")) {
            return parsed.toString();
          }
        } catch {
          // Fall through and treat as search query.
        }

        return `https://www.google.com/search?q=${encodeURIComponent(value)}`;
      }

      async function registerAdminServiceWorker() {
        if (!navigator.serviceWorker) {
          throw new Error("Service workers are not supported in this browser.");
        }

        if (location.protocol !== "https:" && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
          throw new Error("Service workers require HTTPS (or localhost).\n");
        }

        return navigator.serviceWorker.register(__uv$config.sw, {
          scope: __uv$config.prefix,
        });
      }

      async function ensureTransport() {
        const wispUrl = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/wisp/`;
        if ((await connection.getTransport()) !== "/epoxy/index.mjs") {
          await connection.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);
        }
      }

      async function openInProxy(rawInput) {
        const normalizedUrl = normalizeAddress(rawInput);
        addressInput.value = normalizedUrl;

        await registerAdminServiceWorker();
        await ensureTransport();

        // Uses UV XOR codec from uv.config.js via __uv$config.encodeUrl.
        const encodedUrl = __uv$config.encodeUrl(normalizedUrl);
        frame.src = `${__uv$config.prefix}${encodedUrl}`;
        setStatus(`Loaded: ${normalizedUrl}`);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          await openInProxy(addressInput.value);
        } catch (error) {
          setStatus(error.message || String(error), true);
        }
      });

      homeBtn.addEventListener("click", async () => {
        try {
          await openInProxy(HOME_URL);
        } catch (error) {
          setStatus(error.message || String(error), true);
        }
      });

      reloadBtn.addEventListener("click", () => {
        try {
          if (frame.contentWindow) {
            frame.contentWindow.location.reload();
            setStatus("Reloaded current page.");
          } else if (frame.src) {
            frame.src = frame.src;
            setStatus("Reloaded current page.");
          }
        } catch {
          if (frame.src) {
            frame.src = frame.src;
            setStatus("Reloaded current page.");
          }
        }
      });

      window.addEventListener("load", async () => {
        try {
          await openInProxy(HOME_URL);
        } catch (error) {
          setStatus(error.message || String(error), true);
        }
      });
    </script>
  </body>
</html>
